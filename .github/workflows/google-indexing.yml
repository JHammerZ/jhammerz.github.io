name: Sovereign Indexing Push

on:
  push:
    branches:
      - main  # Ensure this matches your primary branch name

jobs:
  index-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Sovereignty
        uses: actions/checkout@v4

      - name: Trigger Lysander Indexing API
        uses: robingenz/action-google-indexing@v1.0.0
        with:
          # Your Truth Anchor
          siteUrl: 'https://github.io'
          # IMPORTANT: This secret MUST contain the full Google JSON key
          gcpServiceAccountKey: ${{ secrets.GOOGLE_INDEXING_API_JSON }}
