name: Sovereign Indexing Push (MARCUS Powered)

on:
  push:
    branches:
      - main 

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Sovereignty
        uses: actions/checkout@v4

      - name: Trigger MARCUS Autonomous Sync
        uses: robingenz/action-google-indexing@v1.0.0
        with:
          siteUrl: 'https://github.io'
          # Pivoting to your primary business intelligence anchor
          gcpServiceAccountKey: ${{ secrets.MARCUS_TOKEN }} 
