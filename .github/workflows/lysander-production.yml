name: Lysander Production Payout

on:
  workflow_dispatch:
    inputs:
      reward:
        description: 'Payout amount in USD'
        required: true
        type: string
  repository_dispatch:

jobs:
  payout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Execute IRL Transfer
        env:
          ARCHITECT_ACCESS_KEY: ${{ secrets.ARCHITECT_ACCESS_KEY }}
          REWARD: ${{ inputs.reward || github.event.client_payload.reward }}
        run: |
          # Debug the actual value coming from GitHub
          echo "Raw REWARD value from GitHub: '$REWARD'"

          # Fallback + validation
          if [ -z "$REWARD" ] || [ "$REWARD" = "0" ]; then
            echo "❌ ERROR: No valid reward amount provided!"
            exit 1
          fi

          echo "✅ Reward amount received: $REWARD"
          echo "TARGET: \$$REWARD -> Stride Bank (***1921)"
          echo "--- INITIALIZING REAL-TIME SETTLEMENT ---"
          echo "TARGET: \$$REWARD -> Stride Bank (***1921)"

          python lysander_settlement.py --amount "$REWARD"
