    function initializeTikTokAuth() {
        const array = new Uint8Array(30);
        const csrfState = Array.from(window.crypto.getRandomValues(array), b => b.toString(16).padStart(2, '0')).join('');
        localStorage.setItem('tiktok_csrf_state', csrfState);

        const redirect_uri = 'https://github.io';
        const scope = 'user.info.basic,video.list,video.upload'; 

        const authUrl = `https://tiktok.com` +
                        `?client_key=${client_key}` +
                        `&scope=${scope}` +
                        `&response_type=code` +
                        `&redirect_uri=${encodeURIComponent(redirect_uri)}` +
                        `&state=${csrfState}`;

        window.location.href = authUrl;
    }

    window.addEventListener('load', () => {
        const params = new URLSearchParams(window.location.search);

        const state = params.get('state');
