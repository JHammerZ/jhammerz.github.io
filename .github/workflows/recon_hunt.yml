name: Real-World Recon Swarm

on:
  repository_dispatch:
    types: [recon_hunt]

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Tools
        run: |
          go install -v github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Update Nuclei Templates
        run: nuclei -update-templates

      - name: Debug Templates
        run: |
          echo "=== DEBUG ==="
          ls ~/nuclei-templates/http/exposures/ 2>/dev/null && echo "exposures folder FOUND" || echo "exposures folder MISSING"
          echo "============="

      - name: Run Recon on Target
        run: |
          TARGET="${{ github.event.client_payload.target }}"
          echo "Scanning: $TARGET"
          
          subfinder -d "$TARGET" -silent -o subdomains.txt
          echo "Subdomains: $(wc -l < subdomains.txt 2>/dev/null || echo 0)"
          
          if [ -s subdomains.txt ]; then
            nuclei -list subdomains.txt -t ~/nuclei-templates/http/exposures/ -silent -o results.txt -severity low,medium,high,critical || true
          else
            touch results.txt
          fi

      - name: Upload Evidence
        uses: actions/upload-artifact@v4
        with:
          name: bug-evidence
          path: results.txt
