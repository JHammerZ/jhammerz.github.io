name: Real-World Recon Swarm

on:
  workflow_dispatch:
  repository_dispatch:
    types: [recon_hunt]

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Tools
        run: |
          go install -v github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest

      - name: Run Recon on Target
        run: |
          # The dashboard sends the target name in the 'client_payload'
          subfinder -d ${{ github.event.client_payload.target }} -silent | nuclei -t nuclei-templates/exposures/ -o results.txt

      - name: Upload Evidence
        uses: actions/upload-artifact@v4
        with:
          name: bug-evidence
          path: results.txt
