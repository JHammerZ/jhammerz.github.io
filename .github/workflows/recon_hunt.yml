name: Real-World Recon Swarm

on:
  repository_dispatch:
    types: [recon_hunt]

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Tools
        run: |
          go install -v github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Update Nuclei Templates
        run: nuclei -update-templates

      - name: Debug Template Path
        run: |
          echo "=== Template Directory Debug ==="
          ls -la ~/nuclei-templates/ 2>/dev/null || echo "Main templates dir not found"
          ls -la ~/nuclei-templates/http/ 2>/dev/null || echo "http/ dir not found"
          ls -la ~/nuclei-templates/http/exposures/ 2>/dev/null || echo "exposures/ dir not found"
          echo "================================="

      - name: Run Recon on Target
        run: |
          TARGET="${{ github.event.client_payload.target }}"
          echo "🔍 Scanning target: $TARGET"
          
          # Subfinder
          subfinder -d "$TARGET" -silent -o subdomains.txt
          echo "→ Found $(wc -l < subdomains.txt 2>/dev/null || echo 0) subdomains"
          
          # Nuclei
          if [ -s subdomains.txt ]; then
            echo "→ Running Nuclei exposure scan..."
            nuclei \
              -list subdomains.txt \
              -t ~/nuclei-templates/http/exposures/ \
              -silent \
              -o results.txt \
              -severity low,medium,high,critical || true
          else
            echo "⚠️ No subdomains found."
            touch results.txt
          fi

          echo "→ Vulnerabilities found: $(wc -l < results.txt 2>/dev/null || echo 0)"

      - name: Upload Evidence
        uses: actions/upload-artifact@v4
        with:
          name: bug-evidence
          path: results.txt
