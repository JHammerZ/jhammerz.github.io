concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # Forces them to finish one-by-one instead of killing each other

name: Lysander Sovereign Engine
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *' # Recursive Autonomy: Runs every 6 hours
  workflow_dispatch:

jobs:
  singularity-mission:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install @google/generative-ai || true

      - name: Execute Sovereign Sequence
        env:
          GOOGLE_API_KEY: ${{ secrets.LYSANDER_3_API_GOOGLE_KEY }}
        run: |
          node api/v1/master_swarm.js || true
          node api/v1/vision_audit.js || true
          node api/v1/bounty_hunter.js || true
          node api/v1/briefing_node.js || true
          node api/v1/sentinel_audit.js || true
          node api/v1/sovereign_write.js || true
          node api/v1/echo_broadcast.js || true

      - name: Commit and Push Evolution
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "Lysander-Architect"
          git config --global user.email "architect@jhammerz.github.io"
          # FIXED BRIDGE: This corrects the URL syntax to prevent exit code 129
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@://github.com{{ github.repository }}.git"
          git add .
          git commit -m "Recursive Evolution: 100/100 Integrity [Full Autonomy]" || echo "No changes"
          git push origin main || true
