name: Lysander 3.0 Autonomous Push

on:
  workflow_dispatch:
  repository_dispatch:
    types: permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Sovereign Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Inject H-FID Logic
        run: |
          git config user.name "Lysander-3-0-Agent"
          git config user.email "architect@jhammerz.io"
          
          echo '${{ github.event.client_payload.logic || '' }}' > manifest.json
          
          git add manifest.json
          git commit -m "Forensic Reset: Autonomous Update" || echo "No changes to commit"
          git push
