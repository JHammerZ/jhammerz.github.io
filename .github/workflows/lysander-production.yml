name: Lysander Production Payout

on:
  workflow_dispatch:
    inputs:
      reward:
        description: 'Payout amount in USD'
        required: true
        type: string
  repository_dispatch:

jobs:
  payout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Execute IRL Transfer
        env:
          ARCHITECT_ACCESS_KEY: ${{ secrets.ARCHITECT_ACCESS_KEY }}
          REWARD: ${{ inputs.reward || github.event.client_payload.reward }}
        run: |
          if [ -z "$REWARD" ]; then
            echo "❌ ERROR: No reward amount provided!"
            exit 1
          fi

          echo "✅ Reward amount received: $REWARD"
          echo "TARGET: $$REWARD -> Stride Bank (***1921)"

          # Run the settlement script but continue even if it fails (for debugging)
          python lysander_settlement.py --amount "$REWARD" || echo "⚠️ Script exited with error (logged above)"

          echo "Settlement attempt completed."
